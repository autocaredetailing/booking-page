<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book an Appointment</title>

<style>
body{
font-family:Arial;
background:#f6f6f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
width:350px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:black;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Book Your Appointment</h2>
<p>We bring the sheen to you ✨</p>

<div id="businessHours">
<strong>Business Hours</strong><br>
Mon–Fri: 7 AM – 3 PM<br>
Saturday: 7 AM – 5 PM<br>
Sunday: 7 AM – 1 PM
</div>

<form id="bookingForm">

<input name="name" placeholder="Full Name" required>
<input name="email" type="email" placeholder="Email Address" required>
<input name="phone" placeholder="Phone Number" required>

<select name="service" required>
<option value="">Select Service</option>
<option>Exterior Manual Wash</option>
<option>Wheel & Tire Cleaning</option>
<option>Interior Vacuum</option>
<option>Dashboard Wipe Down</option>
<option>Standard Detail Package</option>
<option>Premium Detail Package</option>
</select>

<input type="date" id="date" name="date" required>
<input type="time" id="time" name="time" required>

<div id="timeInfo"></div>

<button type="submit">Confirm Booking</button>

</form>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyc59tTIJX91BVbeawwCkcXMD9wUnZnRTwTfTXkn0RCJuCypD3NI_QfN-jG1VTquQ2vHQ/exec"

const form=document.getElementById("bookingForm")
const dateInput=document.getElementById("date")
const timeInput=document.getElementById("time")
const info=document.getElementById("timeInfo")

const hours={
0:{open:7,close:13,name:"Sunday"},
1:{open:7,close:15,name:"Monday"},
2:{open:7,close:15,name:"Tuesday"},
3:{open:7,close:15,name:"Wednesday"},
4:{open:7,close:15,name:"Thursday"},
5:{open:7,close:15,name:"Friday"},
6:{open:7,close:17,name:"Saturday"}
}

dateInput.min=new Date().toISOString().split("T")[0]

dateInput.addEventListener("change",()=>{

const date=new Date(dateInput.value+"T00:00")
const day=date.getDay()
const h=hours[day]

timeInput.min=String(h.open).padStart(2,"0")+":00"
timeInput.max=String(h.close).padStart(2,"0")+":00"

info.textContent=`${h.name} hours: ${timeInput.min} - ${timeInput.max}`

})

form.addEventListener("submit",e=>{
e.preventDefault()

const date=new Date(dateInput.value+"T00:00")
const day=date.getDay()
const h=hours[day]

const hour=parseInt(timeInput.value.split(":")[0])

if(hour<h.open||hour>=h.close){
alert(`Closed at that time. ${h.name}: ${h.open}:00 - ${h.close}:00`)
return
}

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})
.then(res=>res.text())
.then(()=>{

alert("✅ Booking Confirmed!")

form.reset()
info.textContent=""

})
.catch(err=>{
console.error(err)
alert("❌ Booking failed")
})

})

</script>

</body>
</html>
