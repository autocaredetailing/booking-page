<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book an Appointment</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<img src="logo.png" alt="Autocare Detailing Ltd" class="logo">

<h1>Book Your Appointment</h1>
<p>We bring the sheen to you ✨</p>

<form id="bookingForm">

<input type="text" id="name" name="name" placeholder="Full Name" required>

<input type="email" id="email" name="email" placeholder="Email Address" required>

<input type="tel" id="phone" name="phone" placeholder="Phone Number" required>

<select id="service" name="service" required>

<option value="">Select a Service</option>

<optgroup label="Basic Exterior Services">
<option value="Exterior Manual Wash">Exterior Manual Wash</option>
<option value="Wheel & Tire Cleaning">Wheel & Tire Cleaning</option>
<option value="Exterior Dry & Shine">Exterior Dry & Shine</option>
</optgroup>

<optgroup label="Basic Interior Services">
<option value="Interior Vacuum">Interior Vacuum</option>
<option value="Dashboard Wipe Down">Dashboard Wipe Down</option>
<option value="Interior Window Cleaning">Interior Window Cleaning</option>
</optgroup>

<optgroup label="Optional Add-ons">
<option value="Hot Wax">Hot Wax</option>
<option value="Rims and Tire Shine">Rims and Tire Shine</option>
<option value="Odor Removal">Odor Removal</option>
</optgroup>

<optgroup label="Bundled Services">
<option value="Standard Detail Package">Standard Detail Package</option>
<option value="Premium Detail Package">Premium Detail Package</option>
</optgroup>

<optgroup label="Monthly Plans">
<option value="Basic Monthly Plan">Basic Monthly Plan</option>
<option value="Premium Monthly Plan">Premium Monthly Plan</option>
<option value="VIP Monthly Plan">VIP Monthly Plan</option>
</optgroup>

</select>

<input type="date" id="date" name="date" required>

<input type="time" id="time" name="time" required>

<button type="submit">Confirm Booking</button>

</form>

<small>You’ll receive a confirmation after booking.</small>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxhGIjRbVdF9NJEr3weGrV2NZLotRW9oOXpZIaSm-Q72BFyr9ey4CzpWlEY5Tgp7qJ89Q/exec"

const form = document.getElementById("bookingForm")

form.addEventListener("submit", function(e){

e.preventDefault()

const data = Object.fromEntries(new FormData(form))

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(response => response.json())
.then(data => {

alert("Booking confirmed! We will contact you shortly.")

form.reset()

})
.catch(error => {

console.error("Error!", error)

alert("Something went wrong. Please try again.")

})

})

</script>

</body>
</html>
