<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book an Appointment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Book Your Appointment</h1>
    <p>Let’s get you shining ✨</p>

    <form id="bookingForm">
      <img src="logo.png" alt="Autocare Detailing Ltd" class="logo">
      <h1>Book Your Appointment</h1>
      <p>We bring the sheen to you ✨</p>
      <<input type="text" placeholder="Full Name" required>
        
      <input type="email" placeholder="Email Address" required>

      <input type="tel" name="phone" placeholder="Phone Number" required>

      <select required>
         <option value="">Select a Service</option>
         <option>Basic Exterior Services</option>
         <option>Basic Interior Services</option>
         <option>Additional Add-Ons</option>
         <option>Bundled Services</option>
         <option>Monthly Plans</option>
     </select>

<input type="date" id="date" required>

<input type="time" required>

<button type="submit">Confirm Booking</button>
    </form>

    <p class="note">You’ll receive a confirmation email after booking.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
