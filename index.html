<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Page</title>
    <style>
        body {
            background-color: #001f3f; /* dark blue background */
            color: white;
            font-family: Arial, sans-serif;
        }
        .button {
            background: linear-gradient(to right, cyan, #00bcd4);
            border: none;
            padding: 10px 20px;
            text-align: center;
            color: white;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        .time-slot {
            margin: 5px;
            padding: 10px;
            border: 1px solid #00bcd4;
            display: inline-block;
        }
        .booked {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Book Your Appointment</h1>
    <form id="booking-form">
        <label for="date">Select Date:</label>
        <input type="date" id="date" required><br><br>
        <label for="time">Select Time:</label>
        <div id="time-slots">
            <div class="time-slot" data-time="09:00">09:00</div>
            <div class="time-slot" data-time="10:00">10:00</div>
            <div class="time-slot" data-time="11:00">11:00</div>
            <div class="time-slot" data-time="13:00">13:00</div>
            <div class="time-slot" data-time="14:00">14:00</div>
            <div class="time-slot" data-time="15:00">15:00</div>
            <div class="time-slot" data-time="16:00">16:00</div>
        </div>
        <input type="submit" class="button" value="Book Now">
    </form>
    <script>
        const bookedSlots = {};

        document.querySelectorAll('.time-slot').forEach(slot => {
            slot.addEventListener('click', function() {
                if (!this.classList.contains('booked')) {
                    this.classList.toggle('selected');
                }
            });
        });

        document.getElementById('booking-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const selectedDate = document.getElementById('date').value;
            const selectedTime = document.querySelector('.time-slot.selected');

            if (selectedTime) {
                const timeValue = selectedTime.getAttribute('data-time');
                const bookingKey = selectedDate + ' ' + timeValue;

                if (bookedSlots[bookingKey]) {
                    alert('This time slot is already booked. Please choose another.');
                } else {
                    bookedSlots[bookingKey] = true;
                    selectedTime.classList.add('booked');
                    alert('Your appointment for ' + selectedDate + ' at ' + timeValue + ' is booked!');
                    // Optionally reset the form
                    this.reset();
                }
            } else {
                alert('Please select a time slot.');
            }
        });
    </script>
</body>
</html>
